<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Graph Assistant</title>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; margin-bottom: 20px; color: #64ffda; font-size: 1.8rem; }
        .subtitle { text-align: center; color: #888; margin-bottom: 30px; font-size: 0.9rem; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .panel { background: #16213e; border-radius: 12px; padding: 20px; border: 1px solid #0f3460; }
        .panel h2 { color: #64ffda; margin-bottom: 12px; font-size: 1.1rem; }
        textarea { width: 100%; height: 120px; background: #0f3460; border: 1px solid #1a4080; border-radius: 8px; color: #eee; padding: 12px; font-size: 14px; resize: vertical; }
        textarea:focus { outline: none; border-color: #64ffda; }
        .btn { background: #64ffda; color: #1a1a2e; border: none; padding: 10px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.85; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-danger { background: #ff6b6b; margin-left: 10px; }
        #graph-container { width: 100%; height: 400px; border-radius: 8px; background: #0f3460; }
        #logs { height: 200px; overflow-y: auto; background: #0a0a1a; border-radius: 8px; padding: 12px; font-family: monospace; font-size: 12px; color: #aaa; margin-top: 12px; }
        .log-entry { margin-bottom: 4px; }
        .log-entry.step { color: #64ffda; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <h1>🧠 Knowledge Graph Assistant</h1>
    <p class="subtitle">Lesson 1: AI Agent Architecture & Agent Loop | 第一课：智能体架构与智能体循环</p>
    <div class="grid">
        <div>
            <div class="panel">
                <h2>📝 Input Text</h2>
                <textarea id="input" placeholder="Paste text here to extract knowledge triples...&#10;例如: Albert Einstein was born in Germany. He developed the theory of relativity."></textarea>
                <button class="btn" id="extractBtn" onclick="extract()">Extract Triples 抽取三元组</button>
                <button class="btn btn-danger" onclick="clearGraph()">Clear 清空</button>
            </div>
            <div class="panel" style="margin-top:20px">
                <h2>📋 Agent Loop Logs</h2>
                <div id="logs"></div>
            </div>
        </div>
        <div class="panel">
            <h2>🕸️ Knowledge Graph</h2>
            <div id="graph-container"></div>
        </div>
    </div>
</div>
<script>
let network = null;

async function extract() {
    const text = document.getElementById('input').value.trim();
    if (!text) return;
    const btn = document.getElementById('extractBtn');
    btn.disabled = true; btn.textContent = 'Extracting...';
    try {
        const res = await fetch('/api/extract', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({text})
        });
        const data = await res.json();
        showLogs(data.logs || []);
        await loadGraph();
    } catch(e) { showLogs(['ERROR: ' + e.message]); }
    btn.disabled = false; btn.textContent = 'Extract Triples 抽取三元组';
}

async function clearGraph() {
    await fetch('/api/graph', {method: 'DELETE'});
    document.getElementById('logs').innerHTML = '';
    await loadGraph();
}

async function loadGraph() {
    const res = await fetch('/api/graph');
    const data = await res.json();
    const nodes = new vis.DataSet(data.nodes.map(n => ({id: n.id, label: n.label, color: '#64ffda', font: {color: '#fff'}})));
    const edges = new vis.DataSet(data.edges.map((e,i) => ({id: i, from: e.from, to: e.to, label: e.label, color: {color:'#888'}, font: {color:'#ccc', size:10}, arrows:'to'})));
    const container = document.getElementById('graph-container');
    network = new vis.Network(container, {nodes, edges}, {
        physics: {stabilization: {iterations: 100}},
        nodes: {shape: 'dot', size: 16, borderWidth: 2},
        edges: {smooth: {type: 'curvedCW'}},
    });
}

function showLogs(logs) {
    const el = document.getElementById('logs');
    el.innerHTML = logs.map(l => `<div class="log-entry${l.startsWith('[') ? ' step' : ''}">${l}</div>`).join('');
    el.scrollTop = el.scrollHeight;
}

loadGraph();
</script>
</body>
</html>
